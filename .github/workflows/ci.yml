name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  # Job 1: Build & Test — the core pipeline
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw -B verify -Dspring.profiles.active=test

      # Test Report
      # Shows individual test results directly in the GitHub Actions UI
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

      # Coverage Report
      # Posts a coverage summary as a comment on PRs
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Add coverage to PR
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 50
          min-coverage-changed-files: 60
          title: "Backend Test Coverage"
          update-comment: true

  # Job 2: Code Quality — static analysis
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # SpotBugs finds real bugs: null pointer dereferences, SQL injection,
      # infinite loops, resource leaks, etc.
      - name: Run SpotBugs analysis
        run: ./mvnw -B compile spotbugs:check -Dspring.profiles.active=test

